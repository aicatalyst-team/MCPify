apiVersion: batch/v1
kind: Job
metadata:
  name: mcpify-help
  namespace: poc-mcpify
  labels:
    app: mcpify
    autopoc.io/project: mcpify
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 60
  template:
    spec:
      containers:
        - name: mcpify
          image: quay.io/aicatalyst/mcpify:latest
          imagePullPolicy: Always
          args: ["--help"]
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      imagePullSecrets:
        - name: autopoc-registry-pull
      restartPolicy: Never
